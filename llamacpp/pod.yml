apiVersion: v1
kind: Pod
metadata:
  labels:
    app: llamacpp
  name: llamacpp
spec:
  containers:
    - name: llamacpp
      image: ghcr.io/ggml-org/llama.cpp:server
      args:
        - -m
        - /models/model.gguf
        - --port
        - "8080"
        - --host
        - "0.0.0.0"
      ports:
        - containerPort: 8080
          hostPort: 8080
      volumeMounts:
        - mountPath: /models
          name: models-volume
      # For GPU support in podman, you typically pass `--device nvidia.com/gpu=all`
      # or specify resource requests/limits in Kubernetes YAML depending on your podman setup.
  volumes:
    - name: models-volume
      hostPath:
        path: ./models
        type: DirectoryOrCreate

services:
  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_IMAGE_VERSION}
    container_name: pgadmin
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - data:/var/lib/pgadmin
    env_file:
      - .env
    restart: always

volumes:
  data:
    driver: local

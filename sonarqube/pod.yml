apiVersion: v1
kind: Pod
metadata:
  labels:
    app: sonarqube
  name: sonarqube
spec:
  containers:
    - name: sonarqube
      image: sonarqube:10-community
      env:
        - name: SONAR_JDBC_URL
          value: jdbc:postgresql://localhost:5432/sonarqube
        - name: SONAR_JDBC_USERNAME
          value: sonar
        - name: SONAR_JDBC_PASSWORD
          value: sonar
      volumeMounts:
        - name: sonarqube-data
          mountPath: /opt/sonarqube/data
        - name: sonarqube-extensions
          mountPath: /opt/sonarqube/extensions
        - name: sonarqube-logs
          mountPath: /opt/sonarqube/logs
        - name: sonarqube-temp
          mountPath: /opt/sonarqube/temp
      ports:
        - containerPort: 9000
          hostPort: 9000
    - name: postgres
      image: postgres:15-alpine
      env:
        - name: POSTGRES_USER
          value: sonar
        - name: POSTGRES_PASSWORD
          value: sonar
        - name: POSTGRES_DB
          value: sonarqube
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql
  volumes:
    - name: sonarqube-data
      persistentVolumeClaim:
        claimName: sonarqube-data-pvc
    - name: sonarqube-extensions
      persistentVolumeClaim:
        claimName: sonarqube-extensions-pvc
    - name: sonarqube-logs
      persistentVolumeClaim:
        claimName: sonarqube-logs-pvc
    - name: sonarqube-temp
      persistentVolumeClaim:
        claimName: sonarqube-temp-pvc
    - name: postgres-data
      persistentVolumeClaim:
        claimName: postgres-data-pvc
services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:${IMAGE_VERSION}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
    ports:
      - 9443:9443

volumes:
  data:
    driver: local

networks:
  default:
    name: portainer_network
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: portainer
  name: portainer
spec:
  containers:
    - name: portainer
      image: portainer/portainer-ce:lts
      volumeMounts:
        - name: docker-sock
          mountPath: /var/run/docker.sock
        - name: data
          mountPath: /data
      ports:
        - containerPort: 9443
          hostPort: 9443
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock
    - name: data
      persistentVolumeClaim:
        claimName: portainer-data-pvc